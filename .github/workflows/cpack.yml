name: CPack Packaging

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for release (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'
        type: string

permissions:
  contents: write

env:
  GITHUB_USERNAME: ${{ github.repository_owner }}
  GITHUB_EMAIL: "solyuway@example.com"

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ rpm
      - name: Configure and build
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_INSTALL_PREFIX=_install
          cmake --build .
      - name: Create TGZ package
        run: cd build && cpack -G TGZ
      - name: Create DEB package
        run: cd build && cpack -G DEB
      - name: Create RPM package
        run: cd build && cpack -G RPM || echo "RPM skipped"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            build/*.tar.gz
            build/*.deb
            build/*.rpm

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: brew install cmake
      - name: Configure and build
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_INSTALL_PREFIX=_install
          cmake --build .
      - name: Create TGZ package
        run: cd build && cpack -G TGZ
      - name: Create DMG package
        run: cd build && cpack -G DragNDrop || echo "DMG skipped"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-packages
          path: |
            build/*.tar.gz
            build/*.dmg

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: |
          mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022" -A x64
      - name: Build
        run: |
          cd build
          cmake --build . --config Release
      - name: Create TGZ package
        run: |
          cd build
          cpack -G TGZ
      - name: Create ZIP package
        run: |
          cd build
          cpack -G ZIP
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: |
            build/*.tar.gz
            build/*.zip

  release:
    needs: [linux, macos, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Get tag name
        id: get_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ github.event.inputs.tag_name }}"
          else
            TAG_NAME="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: ${{ steps.get_tag.outputs.tag_name }}
          tag_name: ${{ steps.get_tag.outputs.tag_name }}
          body: |
            ## Release ${{ steps.get_tag.outputs.tag_name }}
            
            ### 📦 Packages
            - **Linux**: TGZ, DEB, RPM
            - **macOS**: TGZ, DMG
            - **Windows**: TGZ, ZIP
            
            Created manually via workflow_dispatch or by tag push.
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.dmg
            artifacts/**/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
